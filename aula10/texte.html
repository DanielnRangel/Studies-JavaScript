<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      * {
        box-sizing: border-box;
      }

      div {
        display: block;
        unicode-bidi: isolate;
      }

      .minha-div {
        width: 200px;
        height: 200px;
        background-color: lightblue;
        /* Define a suavidade: transforma o 'transform' em 0.3 segundos */
        /* transition: transform 0.3s ease; */
        transition-duration: 2s;
        transition-property: margin-right, color;
      }

      .minha-div:hover {
        /* Diminui a div para 80% do tamanho original */
        transform: scale(0.8);
      }

      #example-element {
        background-color: #e4f0f5;
        color: black;
        padding: 1rem;
        border-radius: 0.5rem;
        font: 1em monospace;
        width: 100%;
        transition: margin-right 2s;
      }

      #example-element:hover {
        background-color: #990099;
        color: white;
        margin-right: 40%;
      }

      /* #default-example:hover > #example-element {
        background-color: #990099;
        color: white;
        margin-right: 40%;
      } */

      /* Modo para realizar ações quando o mouse passar por cima de um lugar */
      #area:hover {
        background-color: rgb(106, 2, 106);
        transform: scale(0.8);
      }

      /* div#teste {

        margin-top: 100px;
      } */

      /* * width: 1200px;
        display: grid;
        place-items: center;
        height: 5vh;
        transition:
          width 0.3s ease,
          background-color 0.3s ease; */
    </style>
  </head>
  <body>
    <!-- <div class="minha-div">Passe o mouse aqui</div> -->

    <div
      id="example-element"
      style="transition-duration: 2s; transition-property: margin-right, color"
    >
      Div de teste
    </div>
  </body>
</html>
