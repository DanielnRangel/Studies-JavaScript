<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>008</title>

    <style>
      * {
        font: normal 18pt Arial;
      }

      input {
        width: 100px;
      }

      div#res {
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <h1>Somando valores</h1>
    <input type="number" name="txtn1" id="txtn1" /> +
    <input type="number" name="txtn2" id="txtn2" />
    <input type="button" value="somar" onclick="somar()" id="soma" />
    <div id="res"></div>

    <script>
      function somar() {
        tn1 = document.querySelector("input#txtn1");
        tn2 = document.querySelector("input#txtn2");
        result = document.querySelector("div#res");
        n1 = Number(tn1.value);
        n2 = Number(tn2.value);
        s = n1 + n2;
        result.innerHTML = `A soma dos valores inseridos é: <strong>${s}</strong>.`;
      }
    </script>
  </body>
</html>
